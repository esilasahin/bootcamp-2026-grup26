services:
  db:
    image: postgres:16-alpine
    container_name: unimate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unimate
      POSTGRES_USER: unimate
      POSTGRES_PASSWORD: unimate_password
    ports:
      - "5432:5432"
    volumes:
      - unimate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unimate -d unimate"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  unimate_postgres_data:
